services:
  - type: web
    name: v-ad-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      # The following must be added manually in the Render Dashboard:
      # - AWS_REGION
      # - AWS_ACCESS_KEY_ID
      # - AWS_SECRET_ACCESS_KEY
      # - S3_VIDEO_BUCKET
      # - BEDROCK_MODEL_ID
      # - VIDEO_MODEL_ID
      # - FRONTEND_URL
